name: demixr_app
description: Music demixing application

publish_to: 'none'

version: 0.4.1+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  equatable: ^2.0.3
  flutter_svg: ^1.0.0
  intersperse: ^2.0.0
  file_picker: ^4.3.0
  flutter_media_metadata: ^0.1.2
  dartz: ^0.10.1
  provider: ^6.0.1
  path: ^1.8.0
  hive: ^2.0.5
  hive_flutter: ^1.1.0
  path_provider: ^2.0.8
  get: ^4.6.1
  async: ^2.8.2
  audioplayers: ^5.2.1
  audio_video_progress_bar: ^0.10.0
  url_launcher: ^6.0.18
  flowder:
    git:
      url: https://github.com/Harsh223/flowder.git
  percent_indicator: ^3.4.0
  ffmpeg_kit_flutter: ^4.5.1
  youtube_explode_dart: ^1.10.8
  fluttertoast: ^8.0.8
  image: ^3.1.1
  material_floating_search_bar: ^0.3.6
  loadmore: ^2.0.1
  loading_indicator: ^3.0.2
  auto_size_text: ^3.0.0
  modal_bottom_sheet: ^2.0.0
  permission_handler: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.0
  hive_generator: ^1.1.1
  build_runner: ^2.1.7
  flutter_launcher_icons: ^0.9.2
  flutter_native_splash: ^1.3.3

flutter_icons:
  android: true
  ios: false
  image_path_android: "assets/images/logo_android.png"

flutter_native_splash:
  android: true
  ios: false
  image: "assets/images/splash_logo.png"
  color: "#211A18"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
